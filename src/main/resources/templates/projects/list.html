<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Projects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/tasks"><i class="bi bi-check2-square"></i> Task Management</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/tasks"><i class="bi bi-list-task"></i> Tasks</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/projects"><i class="bi bi-folder"></i> Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="/reports/tasks"><i class="bi bi-file-earmark-bar-graph"></i> Reports</a></li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/logout"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-folder"></i> Projects</h2>
            <a href="/projects/new" class="btn btn-primary"><i class="bi bi-plus-circle"></i> New Project</a>
        </div>

        <div class="row">
            <div th:if="${#lists.isEmpty(projects)}" class="col-12">
                <div class="alert alert-info">No projects found. Create your first project!</div>
            </div>
            <div th:each="project : ${projects}" class="col-md-6 col-lg-4 mb-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${project.name}"></h5>
                        <p class="card-text text-muted" th:text="${project.description ?: 'No description'}"></p>
                        <div class="mb-2">
                            <small class="text-muted">
                                <i class="bi bi-person"></i> Owner: 
                                <span th:text="${project.owner != null ? project.owner.username : 'Unknown'}"></span>
                            </small>
                        </div>
                        <div class="mb-2">
                            <small class="text-muted">
                                <i class="bi bi-list-task"></i> Tasks: 
                                <span th:text="${project.taskCount}"></span>
                            </small>
                        </div>
                        <a th:href="@{/projects/{id}(id=${project.id})}" class="btn btn-sm btn-outline-primary">
                            View Details
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
