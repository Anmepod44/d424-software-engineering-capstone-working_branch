<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Project Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/tasks">Task Management</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card">
            <div class="card-header">
                <h4 th:text="${project.name}"></h4>
            </div>
            <div class="card-body">
                <dl class="row">
                    <dt class="col-sm-3">Description:</dt>
                    <dd class="col-sm-9" th:text="${project.description ?: 'No description'}"></dd>

                    <dt class="col-sm-3">Owner:</dt>
                    <dd class="col-sm-9" th:text="${project.owner != null ? project.owner.username : 'Unknown'}"></dd>

                    <dt class="col-sm-3">Total Tasks:</dt>
                    <dd class="col-sm-9" th:text="${project.taskCount}"></dd>

                    <dt class="col-sm-3">Completed Tasks:</dt>
                    <dd class="col-sm-9" th:text="${project.completedTaskCount}"></dd>
                </dl>

                <a href="/projects" class="btn btn-secondary">Back to Projects</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
