<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Task Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/tasks"><i class="bi bi-check2-square"></i> Task Management</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/tasks"><i class="bi bi-list-task"></i> Tasks</a></li>
                    <li class="nav-item"><a class="nav-link" href="/projects"><i class="bi bi-folder"></i> Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="/reports/tasks"><i class="bi bi-file-earmark-bar-graph"></i> Reports</a></li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/logout"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h4>Task Details</h4>
                        <a th:href="@{/tasks/{id}/edit(id=${task.id})}" class="btn btn-primary btn-sm">
                            <i class="bi bi-pencil"></i> Edit
                        </a>
                    </div>
                    <div class="card-body">
                        <dl class="row">
                            <dt class="col-sm-3">Title:</dt>
                            <dd class="col-sm-9" th:text="${task.title}"></dd>

                            <dt class="col-sm-3">Description:</dt>
                            <dd class="col-sm-9" th:text="${task.description ?: 'No description'}"></dd>

                            <dt class="col-sm-3">Status:</dt>
                            <dd class="col-sm-9">
                                <span class="badge" 
                                      th:classappend="${task.status.name() == 'COMPLETED' ? 'bg-success' : 
                                                      task.status.name() == 'IN_PROGRESS' ? 'bg-primary' : 
                                                      task.status.name() == 'CANCELLED' ? 'bg-secondary' : 'bg-warning'}"
                                      th:text="${task.status.displayName}"></span>
                            </dd>

                            <dt class="col-sm-3">Priority:</dt>
                            <dd class="col-sm-9">
                                <span class="badge"
                                      th:classappend="${task.priority.name() == 'URGENT' ? 'bg-danger' : 
                                                      task.priority.name() == 'HIGH' ? 'bg-warning' : 
                                                      task.priority.name() == 'LOW' ? 'bg-secondary' : 'bg-info'}"
                                      th:text="${task.priority.displayName}"></span>
                            </dd>

                            <dt class="col-sm-3">Project:</dt>
                            <dd class="col-sm-9" th:text="${task.project != null ? task.project.name : 'No project'}"></dd>

                            <dt class="col-sm-3">Assigned To:</dt>
                            <dd class="col-sm-9" th:text="${task.assignedTo != null ? task.assignedTo.username : 'Unassigned'}"></dd>

                            <dt class="col-sm-3">Due Date:</dt>
                            <dd class="col-sm-9" th:text="${task.dueDate != null ? #temporals.format(task.dueDate, 'yyyy-MM-dd HH:mm') : 'No due date'}"></dd>

                            <dt class="col-sm-3">Created:</dt>
                            <dd class="col-sm-9" th:text="${#temporals.format(task.createdAt, 'yyyy-MM-dd HH:mm')}"></dd>

                            <dt class="col-sm-3">Last Updated:</dt>
                            <dd class="col-sm-9" th:text="${#temporals.format(task.updatedAt, 'yyyy-MM-dd HH:mm')}"></dd>
                        </dl>

                        <div class="mt-4">
                            <a href="/tasks" class="btn btn-secondary">Back to Tasks</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
