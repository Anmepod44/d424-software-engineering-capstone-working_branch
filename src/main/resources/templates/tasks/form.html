<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${task.id != null ? 'Edit Task' : 'New Task'}">Task Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/tasks"><i class="bi bi-check2-square"></i> Task Management</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h4 th:text="${task.id != null ? 'Edit Task' : 'Create New Task'}"></h4>
                    </div>
                    <div class="card-body">
                        <form th:action="${task.id != null ? '/tasks/' + task.id : '/tasks'}" 
                              th:object="${task}" method="post">
                            <div class="mb-3">
                                <label for="title" class="form-label">Title *</label>
                                <input type="text" class="form-control" id="title" th:field="*{title}" 
                                       required maxlength="200">
                                <div class="form-text">Maximum 200 characters</div>
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" th:field="*{description}" 
                                          rows="4"></textarea>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="status" class="form-label">Status</label>
                                    <select class="form-select" id="status" th:field="*{status}">
                                        <option th:each="s : ${statuses}" th:value="${s}" 
                                                th:text="${s.displayName}"></option>
                                    </select>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label for="priority" class="form-label">Priority</label>
                                    <select class="form-select" id="priority" th:field="*{priority}">
                                        <option th:each="p : ${priorities}" th:value="${p}" 
                                                th:text="${p.displayName}"></option>
                                    </select>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="project" class="form-label">Project</label>
                                    <select class="form-select" id="project" th:field="*{project}">
                                        <option value="">No Project</option>
                                        <option th:each="proj : ${projects}" th:value="${proj.id}" 
                                                th:text="${proj.name}"></option>
                                    </select>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label for="assignedTo" class="form-label">Assigned To</label>
                                    <select class="form-select" id="assignedTo" th:field="*{assignedTo}">
                                        <option value="">Unassigned</option>
                                        <option th:each="user : ${users}" th:value="${user.id}" 
                                                th:text="${user.username}"></option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="dueDate" class="form-label">Due Date</label>
                                <input type="datetime-local" class="form-control" id="dueDate" 
                                       th:field="*{dueDate}">
                            </div>

                            <div class="d-flex justify-content-between">
                                <a href="/tasks" class="btn btn-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-save"></i> Save Task
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
