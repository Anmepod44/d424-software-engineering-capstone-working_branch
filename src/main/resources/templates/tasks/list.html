<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - Task Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/tasks"><i class="bi bi-check2-square"></i> Task Management</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-list-task"></i> Tasks</h2>
            <a href="/tasks/new" class="btn btn-primary"><i class="bi bi-plus-circle"></i> New Task</a>
        </div>

        <!-- Search and Filter Form -->
        <div class="card mb-4">
            <div class="card-body">
                <form method="get" action="/tasks" class="row g-3">
                    <div class="col-md-4">
                        <label for="search" class="form-label">Search</label>
                        <input type="text" class="form-control" id="search" name="search" 
                               th:value="${search}" placeholder="Search tasks...">
                    </div>
                    <div class="col-md-3">
                        <label for="status" class="form-label">Status</label>
                        <select class="form-select" id="status" name="status">
                            <option value="">All Statuses</option>
                            <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.displayName}"
                                    th:selected="${s == selectedStatus}"></option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="projectId" class="form-label">Project</label>
                        <select class="form-select" id="projectId" name="projectId">
                            <option value="">All Projects</option>
                            <option th:each="p : ${projects}" th:value="${p.id}" th:text="${p.name}"
                                    th:selected="${p.id == selectedProjectId}"></option>
                        </select>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-search"></i> Filter</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Tasks Table -->
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Title</th>
                                <th>Status</th>
                                <th>Priority</th>
                                <th>Project</th>
                                <th>Assigned To</th>
                                <th>Due Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(tasks)}">
                                <td colspan="7" class="text-center text-muted">No tasks found</td>
                            </tr>
                            <tr th:each="task : ${tasks}">
                                <td>
                                    <a th:href="@{/tasks/{id}(id=${task.id})}" th:text="${task.title}"></a>
                                </td>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${task.status.name() == 'COMPLETED' ? 'bg-success' : 
                                                          task.status.name() == 'IN_PROGRESS' ? 'bg-primary' : 
                                                          task.status.name() == 'CANCELLED' ? 'bg-secondary' : 'bg-warning'}"
                                          th:text="${task.status.displayName}"></span>
                                </td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${task.priority.name() == 'URGENT' ? 'bg-danger' : 
                                                          task.priority.name() == 'HIGH' ? 'bg-warning' : 
                                                          task.priority.name() == 'LOW' ? 'bg-secondary' : 'bg-info'}"
                                          th:text="${task.priority.displayName}"></span>
                                </td>
                                <td th:text="${task.project != null ? task.project.name : '-'}"></td>
                                <td th:text="${task.assignedTo != null ? task.assignedTo.username : '-'}"></td>
                                <td th:text="${task.dueDate != null ? #temporals.format(task.dueDate, 'yyyy-MM-dd') : '-'}"></td>
                                <td>
                                    <a th:href="@{/tasks/{id}/edit(id=${task.id})}" class="btn btn-sm btn-outline-primary">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post" style="display:inline;">
                                        <button type="submit" class="btn btn-sm btn-outline-danger" 
                                                onclick="return confirm('Are you sure?')">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="mt-3 text-muted">
                    Total: <span th:text="${#lists.size(tasks)}"></span> task(s)
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
