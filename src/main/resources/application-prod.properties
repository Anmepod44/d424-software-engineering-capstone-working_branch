# Production Profile - PostgreSQL Database

# PostgreSQL Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/taskmanagement}
spring.datasource.username=${DATABASE_USERNAME:taskuser}
spring.datasource.password=${DATABASE_PASSWORD:taskpass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Run data.sql after Hibernate has created/updated the schema
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
